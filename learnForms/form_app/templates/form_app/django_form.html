{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block django_form %}


    <form method="post" style="width: 50%; height: 500px; margin: auto;" class="pt-5" enctype="multipart/form-data" >
    {% csrf_token %}
    {{form | crispy}}
    <button class="btn btn-danger mt-3" type="submit">Submit</button>
      
</form>



{% endblock django_form %}
