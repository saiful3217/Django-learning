{% extends "base.html" %}
{% load static %}
{% block title %}Home{% endblock title %}
{% block home %}
<h1>This is home page</h1>

<table class="table">
  <thead>
    <tr>
      <th scope="col">Roll</th>
      <th scope="col">Name</th>
      <th scope="col">Address</th>
      <th scope="col">Father Name</th>
      <th scope="col">ACTION</th>
    </tr>
  </thead>
  <tbody>
    {% for data in datas %}
    <tr>
      <td >{{data.roll}}</td>
      <td>{{data.name}}</td>
      <td>{{data.address}}</td>
      <td>{{data.father_name}}</td>
      <td><a href="{% url 'delete_student' data.roll   %}" class="btn btn-danger " >Delete</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock home %}
