{% extends "base.html" %}
{% load static%}

{% block content %}

    <table class="table">
  <thead>
    <tr>
      <th scope="col">User ID</th>
      <th scope="col">ID</th>
      <th scope="col">Title</th>
      <th scope="col">Body</th>
    </tr>
  </thead>
  <tbody>
    
    {% for i in datas %}
    <tr>
      <th scope="row">{{i.userId}}</th>
      <td>{{i.id}}</td>
      <td>{{i.title}}</td>
      <td>{{i.body}}</td>
    </tr>
    {% endfor %}

  </tbody>

</table>

<div class="h-auto d-inline-block" style="width: 800px;"><img class="img-thumbnail" src="{% static 'images/marco.jpg' %}" alt="a nice img"></div>


<h1>{{id.name}}</h1>
    {% endblock  %}
